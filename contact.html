<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Arial, Helvetica, sans-serif; color: #f8fbff; background: radial-gradient(circle at 18% 24%, rgba(255, 214, 102, 0.5), transparent 28%), radial-gradient(circle at 84% 18%, rgba(78, 205, 196, 0.48), transparent 30%), radial-gradient(circle at 52% 88%, rgba(255, 107, 129, 0.42), transparent 34%), linear-gradient(135deg, #10172a 0%, #25406f 45%, #0f766e 100%); overflow-x: hidden; }
    body::before { content: ""; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 44px 44px; mask-image: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent); pointer-events: none; }
    .site-nav { position: fixed; z-index: 5; top: 22px; left: 50%; display: flex; gap: 10px; width: min(92%, 660px); justify-content: center; padding: 10px; border: 1px solid rgba(255,255,255,0.24); border-radius: 8px; background: rgba(8,18,34,0.45); box-shadow: 0 16px 50px rgba(0,0,0,0.24); backdrop-filter: blur(18px); transform: translateX(-50%); }
    .site-nav a { flex: 1; max-width: 140px; padding: 10px 12px; border-radius: 6px; color: #eaffff; text-decoration: none; font-weight: 700; text-align: center; }
    .site-nav a:hover, .site-nav a.active { background: rgba(255,255,255,0.18); }
    main { position: relative; display: grid; min-height: 100vh; place-items: center; padding: 110px 32px 40px; text-align: center; }
    .hero { width: min(760px, 100%); padding: 48px 36px; border: 1px solid rgba(255,255,255,0.24); border-radius: 8px; background: rgba(8,18,34,0.48); box-shadow: 0 28px 90px rgba(0,0,0,0.35); backdrop-filter: blur(18px); }
    h1 { margin: 0; font-size: clamp(2.8rem, 8vw, 6.5rem); line-height: 1; letter-spacing: 0; text-transform: uppercase; text-shadow: 0 12px 34px rgba(0,0,0,0.35); }
    p { max-width: 590px; margin: 22px auto 0; font-size: clamp(1rem, 2.5vw, 1.2rem); line-height: 1.7; color: #dff7ff; }
    .shine { width: min(300px, 72%); height: 3px; margin: 30px auto 0; border-radius: 999px; background: linear-gradient(90deg, transparent, #ffd666, #4ecdc4, transparent); box-shadow: 0 0 26px rgba(78,205,196,0.8); }
    .contact-links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 28px; }
    .contact-links a { padding: 12px 16px; border: 1px solid rgba(255,255,255,0.24); border-radius: 6px; color: #10172a; background: #ffd666; font-weight: 700; text-decoration: none; }
    .contact-links a.secondary { color: #f8fbff; background: rgba(255,255,255,0.14); }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="Main navigation">
    <a href="Index.html">Home</a>
    <a href="about.html">About</a>
    <a href="features.html">Features</a>
    <a class="active" href="contact.html">Contact</a>
  </nav>
  <main>
    <section class="hero">
      <h1>Contact</h1>
      <div class="shine"></div>
      <p>Have a question or want to say hello? Use the links below to start a conversation.</p>
      <div class="contact-links">
        <a href="mailto:hello@example.com">Email Me</a>
        <a class="secondary" href="Index.html">Back Home</a>
      </div>
    </section>
  </main>
</body>
</html>
