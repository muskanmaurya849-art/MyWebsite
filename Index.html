<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: #f8fbff;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 214, 102, 0.55), transparent 26%),
        radial-gradient(circle at 78% 26%, rgba(78, 205, 196, 0.5), transparent 30%),
        radial-gradient(circle at 45% 82%, rgba(255, 107, 129, 0.45), transparent 34%),
        linear-gradient(135deg, #10172a 0%, #25406f 45%, #0f766e 100%);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent);
      pointer-events: none;
    }

    main {
      position: relative;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 32px;
      text-align: center;
    }

    .hero {
      width: min(760px, 100%);
      padding: 48px 36px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(8, 18, 34, 0.48);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 9vw, 7rem);
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
    }

    p {
      max-width: 560px;
      margin: 22px auto 0;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.7;
      color: #dff7ff;
    }

    .shine {
      width: min(300px, 72%);
      height: 3px;
      margin: 30px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #ffd666, #4ecdc4, transparent);
      box-shadow: 0 0 26px rgba(78, 205, 196, 0.8);
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Hello World </h1>
      <div class="shine"></div>
      <p>A clean, bright first page with a colorful background and a smooth glass-style center panel.</p>
    </section>
  </main>
</body>
</html>
